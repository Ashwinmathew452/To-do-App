<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="light">

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>📝 Notes</h2>
    <button onclick="addNoteUI()">➕ Add</button>

    <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchNotes()" />

    <div id="notesList"></div>
  </div>

  <!-- Main Editor -->
  <div class="main">

    <div class="top-bar">
      <h2>Editor</h2>
      <button onclick="toggleDarkMode()">🌙</button>
    </div>

    <input type="text" id="titleInput" placeholder="Title" />
    <textarea id="contentInput" placeholder="Write your note..."></textarea>
    <input type="text" id="tagInput" placeholder="Tag" />

    <div class="actions">
      <button onclick="addNoteUI()" id="addBtn">Add</button>
      <button onclick="updateNoteUI()" id="updateBtn" style="display:none;">Update</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
